<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identidade Animal</title>
</head>

<body>
    <h1>Cracha do Pet</h1>
    <input type="text" id="nome" placeholder="Nome do Pet"><br>
    <br> <input type="text" id="raca" placeholder="Raça do Pet"><br>
    <br> <input type="number" id="peso" placeholder="Peso do Pet"><br>
    <br><input type="file" id="foto" accept="image/*"><br>
    <br><button onclick="gerarCracha()">Gerar Crachá</button>
    <div id="resultado"> </div>

    <script>
        function gerarCracha() {
            const nome = document.getElementById("nome").value;
            const raca = document.getElementById("raca").value;
            const peso = document.getElementById("peso").value;
            const fotoInput = document.getElementById("foto");

            if (!fotoInput.files[0]) {
                alert("Por favor, selecione uma foto do pet.");
                return;
            }

            const reader = new FileReader();
            reader.onload = function (e) {
                const imagemURL = e.target.result;
                document.getElementById("resultado").innerHTML = `
              <div class="cracha">
                <img src="${imagemURL}" alt="Foto do Pet">
                <h2>${nome}</h2>
                <p><strong>Raça:</strong> ${raca}</p>
                <p><strong>Peso:</strong> ${peso} kg</p>
             
            `;
            }
        reader.readAsDataURL(fotoInput.files[0]);
        }

    </script>


</body>

</html>
